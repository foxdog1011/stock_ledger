name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

env:
  AWS_REGION: ap-northeast-1
  ECR_API_REPO: stock-ledger-api
  ECR_MCP_REPO: stock-ledger-mcp
  ECR_WEB_REPO: stock-ledger-web

jobs:
  # ── Build & push all 3 images to ECR ───────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t $REGISTRY/$ECR_API_REPO:$TAG .
          docker push $REGISTRY/$ECR_API_REPO:$TAG
          docker tag  $REGISTRY/$ECR_API_REPO:$TAG $REGISTRY/$ECR_API_REPO:latest
          docker push $REGISTRY/$ECR_API_REPO:latest

      - name: Build & push MCP
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -f apps/mcp/Dockerfile -t $REGISTRY/$ECR_MCP_REPO:$TAG .
          docker push $REGISTRY/$ECR_MCP_REPO:$TAG
          docker tag  $REGISTRY/$ECR_MCP_REPO:$TAG $REGISTRY/$ECR_MCP_REPO:latest
          docker push $REGISTRY/$ECR_MCP_REPO:latest

      - name: Build & push Web
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build apps/web/ -t $REGISTRY/$ECR_WEB_REPO:$TAG
          docker push $REGISTRY/$ECR_WEB_REPO:$TAG
          docker tag  $REGISTRY/$ECR_WEB_REPO:$TAG $REGISTRY/$ECR_WEB_REPO:latest
          docker push $REGISTRY/$ECR_WEB_REPO:latest

  # ── Deploy to EC2 via SSH ──────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: /app

      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: ${{ env.AWS_REGION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,IMAGE_TAG,AWS_REGION
          command_timeout: 30m

          script: |
            # Login to ECR
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            # Pull new images
            docker pull $ECR_REGISTRY/stock-ledger-api:$IMAGE_TAG
            docker pull $ECR_REGISTRY/stock-ledger-mcp:$IMAGE_TAG
            docker pull $ECR_REGISTRY/stock-ledger-web:$IMAGE_TAG

            # Tag as latest for docker-compose
            docker tag $ECR_REGISTRY/stock-ledger-api:$IMAGE_TAG $ECR_REGISTRY/stock-ledger-api:latest
            docker tag $ECR_REGISTRY/stock-ledger-mcp:$IMAGE_TAG $ECR_REGISTRY/stock-ledger-mcp:latest
            docker tag $ECR_REGISTRY/stock-ledger-web:$IMAGE_TAG $ECR_REGISTRY/stock-ledger-web:latest

            # Restart services with zero-downtime rolling update
            cd /app
            docker compose pull
            docker compose up -d --remove-orphans

            # Cleanup old images
            docker image prune -f

            # ── Research data ingest ─────────────────────────────────────────
            # Clone My-TW-Coverage (shallow to save disk) or pull latest
            if [ ! -d /home/ec2-user/My-TW-Coverage ]; then
              git clone --depth 1 https://github.com/Timeverse/My-TW-Coverage.git \
                /home/ec2-user/My-TW-Coverage
            else
              git -C /home/ec2-user/My-TW-Coverage fetch --depth 1 origin main \
                && git -C /home/ec2-user/My-TW-Coverage reset --hard origin/main || true
            fi
            df -h /home  # log disk usage after clone

            # Wait for the API container to pass its health check (up to 60s)
            for i in $(seq 1 12); do
              if docker exec stock-ledger-api \
                   python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" \
                   2>/dev/null; then
                echo "API healthy"; break
              fi
              echo "Waiting for API... ($i/12)"; sleep 5
            done

            # Copy coverage repo into container and run the ingest script
            docker cp /home/ec2-user/My-TW-Coverage stock-ledger-api:/tmp/My-TW-Coverage
            docker exec stock-ledger-api python scripts/ingest_coverage.py \
              --repo-path /tmp/My-TW-Coverage \
              --db-path /data/ledger.db
