# n8n + PostgreSQL Docker Compose
# Replaces SQLite backend to fix cron state loss on SIGTERM restarts.
#
# Usage:
#   docker compose -f scripts/n8n-postgres-compose.yml up -d
#   docker compose -f scripts/n8n-postgres-compose.yml down
#
# The PostgreSQL data persists in a named volume (n8n_postgres_data).
# n8n data (encryption key, custom nodes) persists in ielts-ai-platform_n8n_data.

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_secure_2026
      POSTGRES_DB: n8n
      TZ: Asia/Taipei
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - n8n-net

  n8n:
    image: n8nio/n8n:latest
    container_name: ielts-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database — PostgreSQL instead of SQLite
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n_secure_2026

      # Server
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/

      # Timezone — critical for cron triggers
      GENERIC_TIMEZONE: Asia/Taipei
      TZ: Asia/Taipei

      # Execution settings — keep history in postgres
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"

      # Node environment
      NODE_ENV: production
    ports:
      - "5800:5678"
    volumes:
      # Reuse the existing n8n data volume (holds encryption key in .n8n/)
      - ielts-ai-platform_n8n_data:/home/node/.n8n
    networks:
      - n8n-net

volumes:
  n8n_postgres_data:
    driver: local
  # Reference the existing external volume so n8n keeps its encryption key
  ielts-ai-platform_n8n_data:
    external: true

networks:
  n8n-net:
    driver: bridge
