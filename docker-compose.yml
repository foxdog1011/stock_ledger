services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: ${ECR_REGISTRY:+${ECR_REGISTRY}/}stock-ledger-api:latest
    container_name: stock-ledger-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_PATH: /data/ledger.db
      QUOTE_PROVIDER: auto
      FINMIND_TOKEN: "${FINMIND_TOKEN:-}"
      TZ: Asia/Taipei
      AUTO_REFRESH_QUOTES_ON_TRADE: "1"
      MCP_URL: "http://mcp:8001/mcp"
      DEMO_MODE: "${DEMO_MODE:-0}"
      JARVIS_KEY: "${JARVIS_KEY:-}"
    volumes:
      - ledger_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  mcp:
    build:
      context: .
      dockerfile: apps/mcp/Dockerfile
    image: ${ECR_REGISTRY:+${ECR_REGISTRY}/}stock-ledger-mcp:latest
    container_name: stock-ledger-mcp
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DB_PATH: /data/ledger.db
      TZ: Asia/Taipei
      MCP_TRANSPORT: streamable-http
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8001"
    volumes:
      - ledger_data:/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: ${ECR_REGISTRY:+${ECR_REGISTRY}/}stock-ledger-web:latest
    container_name: stock-ledger-web
    ports:
      - "3001:3000"
    environment:
      DOCKER: "1"
      # Server-side only: Next.js rewrites /api/* → ${API_URL}/api/*
      API_URL: "http://api:8000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    # 可選：Windows/WSL 有時需要，保險起見加上
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ledger_data:
    driver: local